<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;background:#202124;color:#e8eaed;}
.header{display:flex;justify-content:flex-end;align-items:center;padding:10px 20px;gap:15px;}
.header a{color:#e8eaed;text-decoration:none;font-size:13px;}
.main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.logo{font-size:72px;margin-bottom:30px;}
.logo span:nth-child(1){color:#4285f4;}
.logo span:nth-child(2){color:#ea4335;}
.logo span:nth-child(3){color:#fbbc05;}
.logo span:nth-child(4){color:#4285f4;}
.logo span:nth-child(5){color:#34a853;}
.logo span:nth-child(6){color:#ea4335;}
.search-box{background:#fff;border-radius:24px;padding:10px;width:500px;}
.search-box input{width:100%;border:none;outline:none;}
.buttons{margin-top:20px;}
.buttons button{margin:5px;padding:8px 12px;}
#layers{display:none;}
.layer{background:#fff;color:#000;font-family:'Times New Roman',serif;padding:40px;display:none;text-align:center;}
</style>
</head>
<body>

<div class="main">
<div class="logo">
<span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
</div>

<div class="search-box">
<input type="text" id="searchQuery" placeholder="Busca en Google">
</div>

<div class="buttons">
<button onclick="search()">Buscar</button>
</div>
</div>

<div id="layers"></div>

<script>
function search(){
const q=document.getElementById('searchQuery').value.trim()
if(q==='3301'){
document.querySelector('.main').style.display='none'
document.getElementById('layers').style.display='block'
loadLayers()
}
}

// capas corregidas
const data=[
['7468655f766f6964','the_void'],
['d2hhdF9pc19yZWFs','what_is_real'],
['laer_si_siht','this_is_real'],
['wklv_lv_qrw_uhdo','this_is_not_real'],
['hidden_truth','hidden_truth'],
['deeper_than_code','deeper_than_code'], // FIX layer 6
['sin pista','deeper_than_code'],
['51.5074, 0.1278','london'],
['2,4,8,16,?','32'],
['maybe this is not the end','time']
]

// extras
const extra=[
['66 6f 6c 6c 6f 77','follow'],
['01001000 01001001','hi'],
['ASCII 67 73','gs'],
['Caesar khoor','hello'],
['Base64 Z29vZA==','good'],
['reverse edoc','code'],
['binary 01100001','a'],
['hex 6c6f7374','lost'],
['ROT13 frperg','secret'],
['morse .... . .-.. .-.. ---','hello'],
['π','pi'],
['e','e'],
['console clue','deeper_than_code'],
['I am not a number','free'],
['mirror level','level'],
['prime after 10','11'],
['2^10 last digit','4'],
['order c,a,b','abc'],
['json {"k":"v"}','v'],
['&lt;','<'],
['unicode 0041','a'],
['rgb(255,0,0)','red'],
['md5 a','0cc175b9c0f1b6a831c399e269772661'],
['most common word','the'],
['opposite of 1','0'],
['near end','near'],
['last door','last'],
['almost there','almost'],
['final step','final'],
['key','3301']
]

data.push(...extra)

function loadLayers(){
const c=document.getElementById('layers')
c.innerHTML=''
data.forEach((d,i)=>{
const n=i+2
const div=document.createElement('div')
div.className='layer'
div.id='layer'+n
div.style.display=n===2?'block':'none'
div.innerHTML=`<h2>Layer ${n}</h2><p>${d[0]}</p><input id="i${n}"><button onclick="check(${n})">OK</button>`
c.appendChild(div)
})
}

function check(n){
const val=document.getElementById('i'+n).value.trim().toLowerCase()
if(val===data[n-2][1]){
document.getElementById('layer'+n).style.display='none'
if(n<41){
document.getElementById('layer'+(n+1)).style.display='block'
}else{
showEnd()
}
}else{
alert('Incorrecto')
}
}

function showEnd(){
const c=document.getElementById('layers')
c.innerHTML='<div style="background:black;color:red;text-align:center;padding-top:100px;"><h1>YOU MADE IT</h1></div>'
}

console.log('deeper_than_code')
</script>

</body>
</html>
