<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google</title>
    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      body {
        font-family: Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: #202124;
        color: #e8eaed;
      }
      .header {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        padding: 10px 20px;
        gap: 15px;
      }
      .header a { color:#e8eaed; text-decoration:none; font-size:13px; }
      .header a:hover { text-decoration: underline; }
      .header button {
        background:#8ab4f8; color:#202124; border:none;
        padding:8px 16px; border-radius:4px; font-size:13px; cursor:pointer;
      }
      .header button:hover { background:#aecbfa; }
      .main {
        flex:1; display:flex; flex-direction:column;
        justify-content:center; align-items:center; padding:20px;
      }
      .logo {
        font-size:72px; font-weight:500; margin-bottom:30px; letter-spacing:-2px;
      }
      .logo span:nth-child(1){color:#4285f4;}
      .logo span:nth-child(2){color:#ea4335;}
      .logo span:nth-child(3){color:#fbbc05;}
      .logo span:nth-child(4){color:#4285f4;}
      .logo span:nth-child(5){color:#34a853;}
      .logo span:nth-child(6){color:#ea4335;}
      .search-box {
        display:flex; align-items:center; background:#fff;
        border-radius:24px; padding:8px 16px; width:100%; max-width:584px;
        box-shadow:0 1px 6px rgba(32,33,36,0.28);
      }
      .search-box input {
        flex:1; border:none; outline:none; font-size:16px;
        color:#202124; background:transparent;
      }
      .buttons { margin-top:26px; display:flex; gap:12px; }
      .buttons button {
        background:#303134; color:#e8eaed; border:1px solid #303134;
        padding:10px 16px; border-radius:4px; font-size:14px; cursor:pointer;
      }
      .buttons button:hover { border-color:#5f6368; }
      .footer {
        display:flex; justify-content:space-between;
        padding:10px 20px; font-size:13px; color:#9aa0a6;
      }
      .footer a { color:#9aa0a6; text-decoration:none; }
      .footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="header">
      <a href="#">Gmail</a>
      <a href="#">Imágenes</a>
      <button>Acceder</button>
    </div>

    <div class="main">
      <div class="logo">
        <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
      </div>
      <div class="search-box">
        <input type="text" id="searchQuery" placeholder="Busca en Google o escribe una URL"/>
      </div>
      <div class="buttons">
        <button onclick="search()">Buscar con Google</button>
        <button onclick="alert('No hay suerte esta vez...')">Me siento con suerte</button>
      </div>
    </div>

    <div id="layers" style="display:none; text-align:center; padding:40px;"></div>

    <div class="footer">
      <div>
        <a href="#">Sobre Google</a>
        <a href="#">Publicidad</a>
        <a href="#">Negocios</a>
        <a href="#">Privacidad</a>
        <a href="#">Condiciones</a>
      </div>
      <div>
        <a href="#">Herramientas</a>
      </div>
    </div>

    <script>
      function search() {
        const q = document.getElementById('searchQuery').value.trim()
        if (q === '3301') {
          document.querySelector('.main').style.display = 'none'
          document.getElementById('layers').style.display = 'block'
          loadLayers()
        } else if (q.length > 0) {
          window.location.href =
            'https://www.google.com/search?q=' + encodeURIComponent(q)
        }
      }

      document.getElementById('searchQuery').addEventListener('keypress', function(e){
        if(e.key==='Enter') search()
      })

      const data = [
        ['5+7*2','19'],
        ['A,C,F,J,?','o'],
        ['3+3*3+3','15'],
        ['01001000 01001001','hi'],
        ['1,1,2,3,5,8,?','13'],
        ['oscuridad','oscuridad'],
        ['7*6-4','38'],
        ['B,D,G,K,?','p'],
        ['2^5','32'],
        ['final','ok']
      ]

      for(let i=11;i<=40;i++){
        data.push([i+'+'+i, String(i+i)])
      }

      function loadLayers(){
        const container = document.getElementById('layers')
        container.innerHTML = ''
        data.forEach((d,i)=>{
          const n=i+2
          const div=document.createElement('div')
          div.id='layer'+n
          div.style.display = n===2?'block':'none'
          div.innerHTML = `
            <h2>Layer ${n}</h2>
            <p>${d[0]}</p>
            ${n<41?`<input id="i${n}"><button onclick="check(${n})">OK</button>`:''}
          `
          container.appendChild(div)
        })
      }

      function check(n){
        let val=document.getElementById('i'+n).value.toLowerCase().trim()
        if(val==data[n-2][1]){
          document.getElementById('layer'+n).style.display='none'
          if(n<41) document.getElementById('layer'+(n+1)).style.display='block'
        } else alert('Incorrecto')
      }

      console.log('you_are_being_observed')
    </script>
  </body>
</html>
