<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;background:#202124;color:#e8eaed;}
.header{display:flex;justify-content:flex-end;align-items:center;padding:10px 20px;gap:15px;}
.header a{color:#e8eaed;text-decoration:none;font-size:13px;}
.header a:hover{text-decoration:underline;}
.header button{background:#8ab4f8;color:#202124;border:none;padding:8px 16px;border-radius:4px;font-size:13px;cursor:pointer;}
.header button:hover{background:#aecbfa;}
.main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;}
.logo{font-size:72px;font-weight:500;margin-bottom:30px;letter-spacing:-2px;}
.logo span:nth-child(1){color:#4285f4;}
.logo span:nth-child(2){color:#ea4335;}
.logo span:nth-child(3){color:#fbbc05;}
.logo span:nth-child(4){color:#4285f4;}
.logo span:nth-child(5){color:#34a853;}
.logo span:nth-child(6){color:#ea4335;}
.search-box{display:flex;align-items:center;background:#fff;border-radius:24px;padding:8px 16px;width:100%;max-width:584px;box-shadow:0 1px 6px rgba(32,33,36,0.28);}
.search-box input{flex:1;border:none;outline:none;font-size:16px;color:#202124;background:transparent;}
.buttons{margin-top:26px;display:flex;gap:12px;}
.buttons button{background:#303134;color:#e8eaed;border:1px solid #303134;padding:10px 16px;border-radius:4px;font-size:14px;cursor:pointer;}
.footer{display:flex;justify-content:space-between;padding:10px 20px;font-size:13px;color:#9aa0a6;}
#layers{display:none;}
.layer{background:#fff;color:#000;font-family:'Times New Roman',serif;padding:40px;display:none;text-align:center;}
</style>
</head>
<body>

<div class="header">
<a href="#">Gmail</a>
<a href="#">Imágenes</a>
<button>Acceder</button>
</div>

<div class="main">
<div class="logo">
<span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
</div>

<div class="search-box">
<input type="text" id="searchQuery" placeholder="Busca en Google o escribe una URL">
</div>

<div class="buttons">
<button onclick="search()">Buscar con Google</button>
<button onclick="alert('No hay suerte esta vez...')">Me siento con suerte</button>
</div>
</div>

<div id="layers"></div>

<div class="footer">
<div>
<a href="#">Sobre Google</a>
<a href="#">Publicidad</a>
<a href="#">Negocios</a>
</div>
<div>
<a href="#">Herramientas</a>
</div>
</div>

<script>
// buscador
function search(){
const q=document.getElementById('searchQuery').value.trim()
if(q==='3301'){
document.querySelector('.main').style.display='none'
document.getElementById('layers').style.display='block'
loadLayers()
}else if(q.length>0){
window.location.href='https://www.google.com/search?q='+encodeURIComponent(q)
}
}

// capas (primeras 10 arregladas)
const data=[
['7468655f766f6964','the_void'],
['d2hhdF9pc19yZWFs','what_is_real'],
['laer_si_siht','this_is_real'],
['wklv_lv_qrw_uhdo','this_is_not_real'],
['<!-- hidden_truth -->','hidden_truth'],
['console.log','deeper_than_code'],
['sin pista','deeper_than_code'],
['51.5074, 0.1278','london'],
['2,4,8,16,?','32'],
['maybe this is not the end','time']
]

// capas difíciles (11–40)
const extra=[
['66 6f 6c 6c 6f 77 5f 74 68 65 5f 72 61 62 62 69 74','follow_the_rabbit'],
['01001000 01001001','hi'],
['ASCII: 67 73','gs'],
['Caesar +3: khoor','hello'],
['Base64: Z29vZA==','good'],
['reverse: edoc','code'],
['binary to text: 01100001','a'],
['hex: 6c6f7374','lost'],
['ROT13: frperg','secret'],
['morse: .... . .-.. .-.. ---','hello'],
['π aprox 3.14 → palabra','pi'],
['e = 2.71 → palabra','e'],
['clave oculta en consola','deeper_than_code'],
['“I am not a number”','free'],
['mirror: level','level'],
['first prime after 10','11'],
['último dígito de 2^10','4'],
['orden alfabético: c,a,b','abc'],
['json clue: {"k":"v"}','v'],
['html entity &lt;','<'],
['unicode 0041','a'],
['rgb(255,0,0)','red'],
['hash md5 de "a"','0cc175b9c0f1b6a831c399e269772661'],
['palabra más repetida aquí','the'],
['contrario de 1','0'],
['fin cercano','near'],
['última puerta','last'],
['clave final parcial','almost'],
['último paso','final'],
['clave definitiva','3301']
]

data.push(...extra)

function loadLayers(){
const c=document.getElementById('layers')
c.innerHTML=''
data.forEach((d,i)=>{
const n=i+2
const div=document.createElement('div')
div.className='layer'
div.id='layer'+n
div.style.display=n===2?'block':'none'
div.innerHTML=`<h2>Layer ${n}</h2><p>${d[0]}</p><input id="i${n}"><button onclick="check(${n})">OK</button>`
c.appendChild(div)
})
}

function check(n){
const val=document.getElementById('i'+n).value.trim().toLowerCase()
if(val===data[n-2][1]){
document.getElementById('layer'+n).style.display='none'
if(n<41){
document.getElementById('layer'+(n+1)).style.display='block'
}else{
showEnd()
}
}else{
alert('Incorrecto')
}
}

function showEnd(){
const c=document.getElementById('layers')
c.innerHTML='<div style="background:black;color:red;font-family:monospace;text-align:center;padding-top:100px;"><h1 id="msg">YOU MADE IT</h1></div>'
let t=['this was never a game','you followed every step','we have your attention','welcome']
let i=0
let m=document.getElementById('msg')
let inter=setInterval(()=>{m.textContent=t[i%t.length];i++},2000)
setTimeout(()=>{clearInterval(inter);c.innerHTML='<h1 style="text-align:center;padding-top:100px;">CONNECTION LOST</h1>'},10000)
}

console.log('deeper_than_code')
</script>

</body>
</html>
